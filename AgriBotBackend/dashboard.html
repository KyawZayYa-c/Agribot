<!DOCTYPE html>
<html>
<head>
    <title>🌾 AgriBot Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0e17;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Connection Status */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .status-badge.online {
            background: #00ff8822;
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        .status-badge.offline {
            background: #ff444422;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        .status-dot.online { background: #00ff88; box-shadow: 0 0 20px #00ff8866; }
        .status-dot.offline { background: #ff4444; box-shadow: 0 0 20px #ff444466; animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .vehicle-id {
            color: #8899aa;
            font-size: 0.9rem;
            background: #1a2a3a;
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Telemetry Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .card {
            background: #111927;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #1a2a3a;
            transition: transform 0.2s, border-color 0.3s;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: #00d4ff44;
        }
        .card .icon { font-size: 1.8rem; margin-bottom: 5px; }
        .card .label {
            font-size: 0.8rem;
            color: #8899aa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .value {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 5px;
        }
        .card .value.green { color: #00ff88; }
        .card .value.yellow { color: #ffaa00; }
        .card .value.red { color: #ff4444; }
        .card .value.cyan { color: #00d4ff; }
        .card .unit { font-size: 0.9rem; color: #8899aa; }

        /* Controls */
        .controls {
            background: #111927;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1a2a3a;
            margin-bottom: 20px;
        }
        .controls-title {
            color: #8899aa;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: #1a2a3a;
            color: #8899aa;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-forward { background: #00d4ff; color: #0a0e17; }
        .btn-forward:hover:not(:disabled) { box-shadow: 0 0 30px #00d4ff66; }

        .btn-backward { background: #ff6b6b; color: #0a0e17; }
        .btn-backward:hover:not(:disabled) { box-shadow: 0 0 30px #ff6b6b66; }

        .btn-left { background: #ffd93d; color: #0a0e17; }
        .btn-left:hover:not(:disabled) { box-shadow: 0 0 30px #ffd93d66; }

        .btn-right { background: #6bcb77; color: #0a0e17; }
        .btn-right:hover:not(:disabled) { box-shadow: 0 0 30px #6bcb7766; }

        .btn-stop { background: #ff4444; color: #fff; }
        .btn-stop:hover:not(:disabled) { box-shadow: 0 0 30px #ff444466; }

        .btn-connect { background: #00ff88; color: #0a0e17; }
        .btn-connect:hover:not(:disabled) { box-shadow: 0 0 30px #00ff8866; }

        .btn-disconnect { background: #ff4444; color: #fff; }
        .btn-disconnect:hover:not(:disabled) { box-shadow: 0 0 30px #ff444466; }

        /* Log */
        .log-section {
            background: #111927;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1a2a3a;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .log-header h3 { color: #8899aa; font-weight: 400; font-size: 0.9rem; }
        .log-header .count {
            font-size: 0.8rem;
            color: #556677;
            background: #1a2a3a;
            padding: 3px 12px;
            border-radius: 20px;
        }
        #log {
            background: #0a0e17;
            padding: 12px;
            height: 150px;
            overflow-y: scroll;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        #log::-webkit-scrollbar { width: 6px; }
        #log::-webkit-scrollbar-track { background: #0a0e17; }
        #log::-webkit-scrollbar-thumb { background: #1a2a3a; border-radius: 4px; }
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #0a0e17;
            display: flex;
            gap: 10px;
        }
        .log-entry .time { color: #445566; min-width: 70px; }
        .log-entry .sent { color: #00d4ff; }
        .log-entry .received { color: #00ff88; }
        .log-entry .info { color: #8899aa; }
        .log-entry .warn { color: #ffaa00; }
        .log-entry .error { color: #ff4444; }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .header { flex-direction: column; align-items: flex-start; }
            .grid { grid-template-columns: 1fr 1fr; }
            .card .value { font-size: 1.5rem; }
            .btn { padding: 8px 15px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🌾 AgriBot Dashboard</h1>
            <div class="header-right">
                <span class="vehicle-id" id="vehicleId">🚜 No vehicle</span>
                <div class="status-badge offline" id="statusBadge">
                    <span class="status-dot offline" id="statusDot"></span>
                    <span id="statusText">Disconnected</span>
                </div>
            </div>
        </div>

        <!-- Telemetry Cards -->
        <div class="grid">
            <div class="card">
                <div class="icon">🔋</div>
                <div class="label">Battery</div>
                <div class="value yellow" id="battery">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="icon">🌾</div>
                <div class="label">Seed Level</div>
                <div class="value cyan" id="seedLevel">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="icon">📐</div>
                <div class="label">Area Covered</div>
                <div class="value green" id="areaCovered">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="icon">📡</div>
                <div class="label">Status</div>
                <div class="value cyan" id="vehicleStatus" style="font-size:1.2rem;">Waiting</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="controls-title">🎮 Remote Control</div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
                <button class="btn btn-connect" id="connectBtn">🔗 Connect</button>
                <button class="btn btn-disconnect" id="disconnectBtn" disabled>🔌 Disconnect</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-forward" id="forwardBtn" disabled>⬆️ Forward</button>
                <button class="btn btn-backward" id="backwardBtn" disabled>⬇️ Backward</button>
                <button class="btn btn-left" id="leftBtn" disabled>⬅️ Left</button>
                <button class="btn btn-right" id="rightBtn" disabled>➡️ Right</button>
                <button class="btn btn-stop" id="stopBtn" disabled>🛑 Stop</button>
            </div>
        </div>

        <!-- Log -->
        <div class="log-section">
            <div class="log-header">
                <h3>📋 Event Log</h3>
                <span class="count" id="logCount">0 messages</span>
            </div>
            <div id="log"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // WebSocket Client
        // ==========================================
        let ws = null;
        let isConnected = false;
        let vehicleId = null;

        const logDiv = document.getElementById('log');
        const statusBadge = document.getElementById('statusBadge');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const vehicleIdSpan = document.getElementById('vehicleId');
        const logCountSpan = document.getElementById('logCount');

        let logCount = 0;

        // ==========================================
        // UI Update Functions
        // ==========================================
        function updateStatus(connected) {
            isConnected = connected;
            if (connected) {
                statusBadge.className = 'status-badge online';
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Connected';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('forwardBtn').disabled = false;
                document.getElementById('backwardBtn').disabled = false;
                document.getElementById('leftBtn').disabled = false;
                document.getElementById('rightBtn').disabled = false;
                document.getElementById('stopBtn').disabled = false;
                addLog('✅ ESP32 Connected!', 'info');
            } else {
                statusBadge.className = 'status-badge offline';
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Disconnected';
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                document.getElementById('forwardBtn').disabled = true;
                document.getElementById('backwardBtn').disabled = true;
                document.getElementById('leftBtn').disabled = true;
                document.getElementById('rightBtn').disabled = true;
                document.getElementById('stopBtn').disabled = true;
            }
        }

        function updateTelemetry(data) {
            const batteryEl = document.getElementById('battery');
            const seedEl = document.getElementById('seedLevel');
            const areaEl = document.getElementById('areaCovered');
            const statusEl = document.getElementById('vehicleStatus');

            if (data.battery !== undefined) {
                batteryEl.innerHTML = data.battery + ' <span class="unit">%</span>';
                if (data.battery < 20) batteryEl.className = 'value red';
                else if (data.battery < 50) batteryEl.className = 'value yellow';
                else batteryEl.className = 'value green';
            }
            if (data.seedLevel !== undefined) {
                seedEl.innerHTML = data.seedLevel + ' <span class="unit">%</span>';
            }
            if (data.areaCovered !== undefined) {
                areaEl.innerHTML = data.areaCovered + ' <span class="unit">%</span>';
            }
            if (data.status !== undefined) {
                statusEl.textContent = data.status;
            }
            if (data.vehicleId !== undefined) {
                vehicleId = data.vehicleId;
                vehicleIdSpan.textContent = '🚜 ' + vehicleId;
                addLog('🚗 Vehicle registered: ' + vehicleId, 'info');
            }
        }

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            let msgClass = 'info';
            let icon = 'ℹ️ ';
            switch(type) {
                case 'sent': msgClass = 'sent'; icon = '📤 '; break;
                case 'received': msgClass = 'received'; icon = '📨 '; break;
                case 'warn': msgClass = 'warn'; icon = '⚠️ '; break;
                case 'error': msgClass = 'error'; icon = '❌ '; break;
                default: msgClass = 'info'; icon = 'ℹ️ '; break;
            }
            entry.innerHTML = `<span class="time">${time}</span><span class="${msgClass}">${icon}${message}</span>`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            logCount++;
            logCountSpan.textContent = logCount + ' messages';
            while (logDiv.children.length > 100) {
                logDiv.removeChild(logDiv.firstChild);
            }
        }

        // ==========================================
        // WebSocket Functions
        // ==========================================
        function connectWebSocket() {
            try {
                addLog('Connecting to WebSocket server...', 'info');
                ws = new WebSocket('ws://localhost:5233/ws');

                ws.onopen = function() {
                    addLog('✅ Connected to server!', 'info');
                    updateStatus(true);
                    const registerMsg = {
                        type: 'register',
                        vehicleId: 'dashboard-001'
                    };
                    ws.send(JSON.stringify(registerMsg));
                    addLog('📤 Sent: Register (dashboard-001)', 'sent');
                };

                ws.onmessage = function(event) {
                    addLog('📨 Received: ' + event.data, 'received');
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'telemetry') {
                            updateTelemetry(data);
                        }
                        if (data.type === 'register_ack') {
                            updateTelemetry({ vehicleId: data.vehicleId });
                        }
                    } catch (e) {
                        // Not JSON
                    }
                };

                ws.onerror = function(error) {
                    addLog('❌ WebSocket Error: ' + (error.message || 'Connection error'), 'error');
                };

                ws.onclose = function() {
                    addLog('❌ Disconnected from server', 'error');
                    updateStatus(false);
                    vehicleIdSpan.textContent = '🚜 No vehicle';
                };

            } catch (error) {
                addLog('❌ Connection failed: ' + error.message, 'error');
            }
        }

        function sendCommand(command, value) {
            if (!isConnected) {
                addLog('⚠️ Not connected!', 'warn');
                return;
            }
            const msg = JSON.stringify({ command, value });
            ws.send(msg);
            addLog('📤 Command: ' + command + ' = ' + value, 'sent');
        }

        // ==========================================
        // Event Listeners
        // ==========================================
        document.getElementById('connectBtn').addEventListener('click', connectWebSocket);

        document.getElementById('disconnectBtn').addEventListener('click', function() {
            if (ws) {
                ws.close();
                addLog('🔌 Disconnected by user', 'info');
                updateStatus(false);
            }
        });

        document.getElementById('forwardBtn').addEventListener('click', function() {
            sendCommand('forward', '50');
        });

        document.getElementById('backwardBtn').addEventListener('click', function() {
            sendCommand('backward', '30');
        });

        document.getElementById('leftBtn').addEventListener('click', function() {
            sendCommand('left', '30');
        });

        document.getElementById('rightBtn').addEventListener('click', function() {
            sendCommand('right', '30');
        });

        document.getElementById('stopBtn').addEventListener('click', function() {
            sendCommand('stop', '0');
        });

        // ==========================================
        // Initial State
        // ==========================================
        updateStatus(false);
        addLog('💡 Click "Connect" to connect to WebSocket server', 'info');
        addLog('📌 Use buttons to control ESP32', 'info');
    </script>
</body>
</html>
