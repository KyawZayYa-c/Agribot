<!DOCTYPE html>
<html>
<head>
    <title>🌾 ESP32 Test - AgriBot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0e17;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #8899aa;
            font-size: 0.9rem;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .status-badge.online {
            background: #00ff8822;
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        .status-badge.offline {
            background: #ff444422;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        .status-dot.online { background: #00ff88; box-shadow: 0 0 20px #00ff8866; }
        .status-dot.offline { background: #ff4444; box-shadow: 0 0 20px #ff444466; animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* Video Container */
        .video-container {
            background: #111927;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #1a2a3a;
            margin-bottom: 20px;
            text-align: center;
        }
        .video-container .video-title {
            color: #8899aa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .video-container video,
        .video-container img {
            width: 100%;
            max-width: 640px;
            border-radius: 8px;
            background: #0a0e17;
            border: 1px solid #1a2a3a;
            max-height: 480px;
            object-fit: cover;
        }
        .video-container .video-placeholder {
            color: #445566;
            padding: 40px 20px;
            font-size: 1.1rem;
        }
        .video-container .video-placeholder .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: #111927;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #1a2a3a;
        }
        .card .icon { font-size: 1.5rem; }
        .card .label {
            font-size: 0.75rem;
            color: #8899aa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 3px;
        }
        .card .value.green { color: #00ff88; }
        .card .value.yellow { color: #ffaa00; }
        .card .value.red { color: #ff4444; }
        .card .value.cyan { color: #00d4ff; }
        .card .unit { font-size: 0.8rem; color: #8899aa; }

        .controls {
            background: #111927;
            border-radius: 12px;
            padding: 15px 20px;
            border: 1px solid #1a2a3a;
            margin-bottom: 20px;
        }
        .controls-title {
            color: #8899aa;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: #1a2a3a;
            color: #8899aa;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-forward { background: #00d4ff; color: #0a0e17; }
        .btn-forward:hover:not(:disabled) { box-shadow: 0 0 30px #00d4ff66; }
        .btn-backward { background: #ff6b6b; color: #0a0e17; }
        .btn-backward:hover:not(:disabled) { box-shadow: 0 0 30px #ff6b6b66; }
        .btn-left { background: #ffd93d; color: #0a0e17; }
        .btn-left:hover:not(:disabled) { box-shadow: 0 0 30px #ffd93d66; }
        .btn-right { background: #6bcb77; color: #0a0e17; }
        .btn-right:hover:not(:disabled) { box-shadow: 0 0 30px #6bcb7766; }
        .btn-stop { background: #ff4444; color: #fff; }
        .btn-stop:hover:not(:disabled) { box-shadow: 0 0 30px #ff444466; }

        .log-section {
            background: #111927;
            border-radius: 12px;
            padding: 15px 20px;
            border: 1px solid #1a2a3a;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .log-header h3 { color: #8899aa; font-weight: 400; font-size: 0.85rem; }
        .log-header .count {
            font-size: 0.75rem;
            color: #556677;
            background: #1a2a3a;
            padding: 2px 12px;
            border-radius: 20px;
        }
        #log {
            background: #0a0e17;
            padding: 10px;
            height: 120px;
            overflow-y: scroll;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            line-height: 1.6;
        }
        #log::-webkit-scrollbar { width: 5px; }
        #log::-webkit-scrollbar-track { background: #0a0e17; }
        #log::-webkit-scrollbar-thumb { background: #1a2a3a; border-radius: 4px; }
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #0a0e17;
            display: flex;
            gap: 10px;
        }
        .log-entry .time { color: #445566; min-width: 65px; }
        .log-entry .sent { color: #00d4ff; }
        .log-entry .received { color: #00ff88; }
        .log-entry .info { color: #8899aa; }
        .log-entry .warn { color: #ffaa00; }
        .log-entry .error { color: #ff4444; }
        .log-entry .success { color: #00ff88; }

        .vehicle-id {
            color: #8899aa;
            font-size: 0.85rem;
            background: #1a2a3a;
            padding: 4px 14px;
            border-radius: 20px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .grid { grid-template-columns: 1fr 1fr; }
            .card .value { font-size: 1.4rem; }
            .btn { padding: 6px 14px; font-size: 0.8rem; }
            .video-container video,
            .video-container img { max-height: 280px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>🌾 ESP32 Test</h1>
                <div class="subtitle">AgriBot - Real-time Telemetry + Video</div>
            </div>
            <div style="display:flex; align-items:center; gap:15px; flex-wrap:wrap;">
                <span class="vehicle-id" id="vehicleId">🚜 Waiting...</span>
                <div class="status-badge offline" id="statusBadge">
                    <span class="status-dot offline" id="statusDot"></span>
                    <span id="statusText">Disconnected</span>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
<!-- VIDEO STREAM - NEW SECTION                  -->
<!-- ========================================== -->
<div class="video-container">
    <div class="video-title">📹 Live Video Stream</div>
    <div id="videoWrapper">
        <!-- ✅ ပြင်ဆင်ပြီး - ESP32-CAM Stream URL -->
        <img id="videoStream" 
     src="http://10.53.54.30:81/stream" 
     alt="Video Stream" 
     style="display:none;" />
        <div class="video-placeholder" id="videoPlaceholder">
            <span class="icon">📷</span>
            <div>Waiting for ESP32 Camera...</div>
            <div style="font-size:0.8rem; margin-top:8px; color:#556677;">
                Make sure ESP32-CAM is connected and streaming
            </div>
        </div>
    </div>
    <div style="margin-top:10px;">
        <button class="btn" id="toggleVideoBtn" style="background:#1a2a3a; color:#00d4ff; border:1px solid #00d4ff44;">
            🔄 Reload Stream
        </button>
        <span id="videoStatus" style="color:#445566; font-size:0.8rem; margin-left:10px;">⏳ Not loaded</span>
    </div>
</div>

        <!-- Telemetry Cards -->
        <div class="grid">
            <div class="card">
                <div class="icon">🔋</div>
                <div class="label">Battery</div>
                <div class="value yellow" id="battery">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="icon">🌾</div>
                <div class="label">Seed Level</div>
                <div class="value cyan" id="seedLevel">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="icon">📐</div>
                <div class="label">Area Covered</div>
                <div class="value green" id="areaCovered">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="icon">📡</div>
                <div class="label">Status</div>
                <div class="value cyan" id="vehicleStatus" style="font-size:1.1rem;">Waiting</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="controls-title">🎮 Remote Control</div>
            <div class="btn-group">
                <button class="btn btn-forward" id="forwardBtn" disabled>⬆️ Forward</button>
                <button class="btn btn-backward" id="backwardBtn" disabled>⬇️ Backward</button>
                <button class="btn btn-left" id="leftBtn" disabled>⬅️ Left</button>
                <button class="btn btn-right" id="rightBtn" disabled>➡️ Right</button>
                <button class="btn btn-stop" id="stopBtn" disabled>🛑 Stop</button>
            </div>
        </div>

        <!-- Log -->
        <div class="log-section">
            <div class="log-header">
                <h3>📋 Event Log</h3>
                <span class="count" id="logCount">0 messages</span>
            </div>
            <div id="log"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const WS_URL = 'ws://localhost:5233/ws';
        const VEHICLE_ID = 'esp32-test-001';

        // ==========================================
        // VIDEO CONFIGURATION
        // ==========================================
        // 🔧 ခင်ဗျားရဲ့ ESP32-CAM IP ကို ဒီမှာ ထည့်ပါ
        const ESP32_CAM_IP = '10.53.54.30';  // ← ESP32-CAM ရဲ့ IP ကို ပြောင်းပါ
        const VIDEO_URL = `http://${ESP32_CAM_IP}:81/stream`;

        // ==========================================
        // STATE
        // ==========================================
        let ws = null;
        let isConnected = false;
        let isEsp32Connected = false;
        let logCount = 0;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;
        let videoReloadCount = 0;

        // ==========================================
        // DOM REFS
        // ==========================================
        const logDiv = document.getElementById('log');
        const statusBadge = document.getElementById('statusBadge');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const vehicleIdSpan = document.getElementById('vehicleId');
        const logCountSpan = document.getElementById('logCount');

        const videoStream = document.getElementById('videoStream');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const videoStatus = document.getElementById('videoStatus');
        const toggleVideoBtn = document.getElementById('toggleVideoBtn');

        // ==========================================
        // VIDEO FUNCTIONS
        // ==========================================
        function loadVideoStream() {
            videoReloadCount++;
            videoStatus.textContent = '🔄 Loading...';
            videoStatus.style.color = '#ffaa00';

            // Set the video source
            videoStream.src = VIDEO_URL + '?t=' + Date.now();  // Cache bust
            videoStream.style.display = 'block';
            videoPlaceholder.style.display = 'none';

            // Handle load events
            videoStream.onload = function() {
                videoStatus.textContent = '✅ Stream loaded!';
                videoStatus.style.color = '#00ff88';
                addLog('📹 Video stream loaded from: ' + ESP32_CAM_IP, 'success');
            };

            videoStream.onerror = function() {
                videoStatus.textContent = '❌ Failed to load stream';
                videoStatus.style.color = '#ff4444';
                videoStream.style.display = 'none';
                videoPlaceholder.style.display = 'block';
                addLog('❌ Video stream failed to load. Check ESP32-CAM connection.', 'error');
            };

            // Try to reload after 5 seconds if still loading
            setTimeout(() => {
                if (videoStatus.textContent === '🔄 Loading...') {
                    videoStatus.textContent = '⏳ Still loading...';
                    videoStatus.style.color = '#ffaa00';
                }
            }, 5000);
        }

        function toggleVideo() {
            loadVideoStream();
        }

        function updateVideoStatus(connected) {
            if (connected) {
                // ESP32 connected, try to load video
                setTimeout(loadVideoStream, 1000);
            } else {
                videoStatus.textContent = '⏳ Waiting for ESP32...';
                videoStatus.style.color = '#445566';
                videoStream.style.display = 'none';
                videoPlaceholder.style.display = 'block';
            }
        }

        // ==========================================
        // UI UPDATE FUNCTIONS
        // ==========================================
        function updateStatus(connected) {
            isConnected = connected;
            if (connected) {
                statusBadge.className = 'status-badge online';
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Connected';
                document.getElementById('forwardBtn').disabled = false;
                document.getElementById('backwardBtn').disabled = false;
                document.getElementById('leftBtn').disabled = false;
                document.getElementById('rightBtn').disabled = false;
                document.getElementById('stopBtn').disabled = false;
                addLog('✅ Connected to C# Server!', 'success');
            } else {
                statusBadge.className = 'status-badge offline';
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Disconnected';
                document.getElementById('forwardBtn').disabled = true;
                document.getElementById('backwardBtn').disabled = true;
                document.getElementById('leftBtn').disabled = true;
                document.getElementById('rightBtn').disabled = true;
                document.getElementById('stopBtn').disabled = true;
            }
        }

        function updateTelemetry(data) {
            const batteryEl = document.getElementById('battery');
            const seedEl = document.getElementById('seedLevel');
            const areaEl = document.getElementById('areaCovered');
            const statusEl = document.getElementById('vehicleStatus');

            if (data.battery !== undefined) {
                batteryEl.innerHTML = data.battery + ' <span class="unit">%</span>';
                if (data.battery < 20) batteryEl.className = 'value red';
                else if (data.battery < 50) batteryEl.className = 'value yellow';
                else batteryEl.className = 'value green';
            }
            if (data.seedLevel !== undefined) {
                seedEl.innerHTML = data.seedLevel + ' <span class="unit">%</span>';
            }
            if (data.areaCovered !== undefined) {
                areaEl.innerHTML = data.areaCovered + ' <span class="unit">%</span>';
            }
            if (data.status !== undefined) {
                statusEl.textContent = data.status;
            }
            if (data.vehicleId !== undefined) {
                vehicleIdSpan.textContent = '🚜 ' + data.vehicleId;
                isEsp32Connected = true;
                addLog('🚗 ESP32 Registered: ' + data.vehicleId, 'success');
                // Video stream ကို load လုပ်ပါ
                updateVideoStatus(true);
            }
        }

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            let msgClass = 'info';
            let icon = 'ℹ️ ';
            switch(type) {
                case 'sent': msgClass = 'sent'; icon = '📤 '; break;
                case 'received': msgClass = 'received'; icon = '📨 '; break;
                case 'warn': msgClass = 'warn'; icon = '⚠️ '; break;
                case 'error': msgClass = 'error'; icon = '❌ '; break;
                case 'success': msgClass = 'success'; icon = '✅ '; break;
                default: msgClass = 'info'; icon = 'ℹ️ '; break;
            }
            entry.innerHTML = `<span class="time">${time}</span><span class="${msgClass}">${icon}${message}</span>`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            logCount++;
            logCountSpan.textContent = logCount + ' messages';
            while (logDiv.children.length > 100) {
                logDiv.removeChild(logDiv.firstChild);
            }
        }

        // ==========================================
        // WEBSOCKET FUNCTIONS
        // ==========================================
        function connectWebSocket() {
            try {
                addLog('🔗 Connecting to C# Server...', 'info');
                ws = new WebSocket(WS_URL);

                ws.onopen = function() {
                    addLog('✅ WebSocket Connected!', 'success');
                    updateStatus(true);
                    const registerMsg = {
                        type: 'register',
                        vehicleId: VEHICLE_ID
                    };
                    ws.send(JSON.stringify(registerMsg));
                    addLog('📤 Sent: Register (' + VEHICLE_ID + ')', 'sent');
                };

                ws.onmessage = function(event) {
                    addLog('📨 Received: ' + event.data, 'received');
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'telemetry') {
                            updateTelemetry(data);
                        }
                        if (data.type === 'register_ack') {
                            updateTelemetry({ vehicleId: data.vehicleId });
                        }
                        if (data.command) {
                            addLog('📨 Command from ESP32: ' + data.command, 'received');
                        }
                    } catch (e) {
                        // Not JSON, ignore
                    }
                };

                ws.onerror = function(error) {
                    addLog('❌ WebSocket Error: ' + (error.message || 'Connection error'), 'error');
                };

                ws.onclose = function() {
                    addLog('❌ Disconnected from server', 'error');
                    updateStatus(false);
                    vehicleIdSpan.textContent = '🚜 Waiting...';
                    isEsp32Connected = false;
                    videoStatus.textContent = '⏳ Disconnected';
                    videoStatus.style.color = '#445566';
                    videoStream.style.display = 'none';
                    videoPlaceholder.style.display = 'block';
                    if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                        reconnectAttempts++;
                        addLog('🔄 Reconnecting... (' + reconnectAttempts + '/' + MAX_RECONNECT_ATTEMPTS + ')', 'warn');
                        setTimeout(connectWebSocket, 3000);
                    } else {
                        addLog('❌ Max reconnect attempts reached. Please refresh page.', 'error');
                    }
                };

            } catch (error) {
                addLog('❌ Connection failed: ' + error.message, 'error');
            }
        }

        function sendCommand(command, value) {
            if (!isConnected) {
                addLog('⚠️ Not connected to server!', 'warn');
                return;
            }
            const msg = JSON.stringify({ command, value });
            ws.send(msg);
            addLog('📤 Command: ' + command + ' = ' + value, 'sent');
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        document.getElementById('forwardBtn').addEventListener('click', function() {
            sendCommand('forward', '50');
        });

        document.getElementById('backwardBtn').addEventListener('click', function() {
            sendCommand('backward', '30');
        });

        document.getElementById('leftBtn').addEventListener('click', function() {
            sendCommand('left', '30');
        });

        document.getElementById('rightBtn').addEventListener('click', function() {
            sendCommand('right', '30');
        });

        document.getElementById('stopBtn').addEventListener('click', function() {
            sendCommand('stop', '0');
        });

        document.getElementById('toggleVideoBtn').addEventListener('click', function() {
            loadVideoStream();
        });

        // ==========================================
        // KEYBOARD SHORTCUTS
        // ==========================================
        document.addEventListener('keydown', function(e) {
            switch(e.key) {
                case 'w': case 'W': sendCommand('forward', '50'); break;
                case 's': case 'S': sendCommand('backward', '30'); break;
                case 'a': case 'A': sendCommand('left', '30'); break;
                case 'd': case 'D': sendCommand('right', '30'); break;
                case ' ': e.preventDefault(); sendCommand('stop', '0'); break;
                case 'r': case 'R': loadVideoStream(); break;
            }
        });

        // ==========================================
        // AUTO-CONNECT ON PAGE LOAD
        // ==========================================
        addLog('💡 Page loaded. Auto-connecting to C# Server...', 'info');
        addLog('📌 Keyboard: W(forward) S(backward) A(left) D(right) Space(stop) R(reload video)', 'info');
        addLog('📌 Video: Make sure ESP32-CAM IP is set correctly in the code.', 'info');
        connectWebSocket();
    </script>
</body>
</html>
