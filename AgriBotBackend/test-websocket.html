<!DOCTYPE html>
<html>
<head>
    <title>🌾 AgriBot Dashboard - Real-time</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0a0e17; 
            color: #fff; 
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 { 
            text-align: center; 
            font-size: 2.5rem; 
            margin-bottom: 30px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111927;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #1a2a3a;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s;
        }
        .status-dot.online { background: #00ff88; box-shadow: 0 0 20px #00ff8866; }
        .status-dot.offline { background: #ff4444; box-shadow: 0 0 20px #ff444466; }
        
        .status-text { font-size: 1.1rem; font-weight: 600; }
        .status-text.online { color: #00ff88; }
        .status-text.offline { color: #ff4444; }
        
        .vehicle-id {
            color: #8899aa;
            font-size: 0.9rem;
            background: #1a2a3a;
            padding: 5px 15px;
            border-radius: 20px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .card {
            background: #111927;
            padding: 25px 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #1a2a3a;
            transition: transform 0.2s, border-color 0.3s;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: #00d4ff;
        }
        
        .card .icon { font-size: 2rem; margin-bottom: 8px; }
        .card .label { 
            font-size: 0.85rem; 
            color: #8899aa; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-top: 5px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card .unit { font-size: 1rem; -webkit-text-fill-color: #8899aa; }
        
        .log-section {
            background: #111927;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1a2a3a;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .log-header h3 { color: #8899aa; font-weight: 400; }
        .log-header .count { 
            font-size: 0.8rem; 
            color: #556677;
            background: #1a2a3a;
            padding: 3px 12px;
            border-radius: 20px;
        }
        
        #log {
            background: #0a0e17;
            padding: 12px;
            height: 200px;
            overflow-y: scroll;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        #log::-webkit-scrollbar { width: 6px; }
        #log::-webkit-scrollbar-track { background: #0a0e17; }
        #log::-webkit-scrollbar-thumb { background: #1a2a3a; border-radius: 4px; }
        
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #0a0e17;
        }
        .log-entry .time { color: #445566; margin-right: 10px; }
        .log-entry .sent { color: #00d4ff; }
        .log-entry .received { color: #00ff88; }
        .log-entry .info { color: #8899aa; }
        .log-entry .warn { color: #ffaa00; }
        .log-entry .error { color: #ff4444; }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: #1a2a3a;
            color: #8899aa;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        
        .btn-connect { background: #00ff88; color: #0a0e17; }
        .btn-connect:hover:not(:disabled) { box-shadow: 0 0 30px #00ff8866; }
        
        .btn-disconnect { background: #ff4444; color: #fff; }
        .btn-disconnect:hover:not(:disabled) { box-shadow: 0 0 30px #ff444466; }
        
        .btn-command { 
            background: #1a2a3a; 
            color: #00d4ff;
            border: 1px solid #00d4ff44;
        }
        .btn-command:hover:not(:disabled) { 
            background: #00d4ff22;
            border-color: #00d4ff;
        }
        
        .cmd-input {
            background: #0a0e17;
            border: 1px solid #1a2a3a;
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1rem;
            width: 250px;
        }
        .cmd-input:focus { outline: none; border-color: #00d4ff; }
        
        .flex { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr 1fr; }
            .card .value { font-size: 1.6rem; }
            .status-bar { flex-direction: column; gap: 10px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 AgriBot Dashboard</h1>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot offline" id="statusDot"></span>
                <span class="status-text offline" id="statusText">Disconnected</span>
            </div>
            <div class="flex" style="gap:15px;">
                <span class="vehicle-id" id="vehicleId">🚜 Not registered</span>
                <span style="color:#445566;" id="timestamp">--:--:--</span>
            </div>
        </div>
        
        <!-- Telemetry Cards -->
        <div class="grid">
            <div class="card">
                <div class="icon">🔋</div>
                <div class="label">Battery</div>
                <div class="value" id="battery">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="icon">🌾</div>
                <div class="label">Seed Level</div>
                <div class="value" id="seedLevel">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="icon">📐</div>
                <div class="label">Area Covered</div>
                <div class="value" id="areaCovered">-- <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="icon">📡</div>
                <div class="label">Status</div>
                <div class="value" id="vehicleStatus" style="font-size:1.4rem;">Waiting</div>
            </div>
        </div>
        
        <!-- Controls -->
        <div class="btn-group">
            <button class="btn btn-connect" id="connectBtn">🔗 Connect</button>
            <button class="btn btn-disconnect" id="disconnectBtn" disabled>🔌 Disconnect</button>
            <button class="btn btn-command" id="sendTelemetryBtn" disabled>📊 Simulate Telemetry</button>
        </div>
        
        <div class="flex" style="margin-bottom:20px;">
            <input class="cmd-input" id="commandInput" placeholder='{"command":"forward","value":"50"}' value='{"command":"forward","value":"50"}'>
            <button class="btn btn-command" id="sendCommandBtn" disabled>📤 Send Command</button>
            <button class="btn btn-command" id="forwardBtn" disabled>⬆️ Forward</button>
            <button class="btn btn-command" id="backwardBtn" disabled>⬇️ Backward</button>
            <button class="btn btn-command" id="stopBtn" disabled>🛑 Stop</button>
        </div>
        
        <!-- Log -->
        <div class="log-section">
            <div class="log-header">
                <h3>📋 Event Log</h3>
                <span class="count" id="logCount">0 messages</span>
            </div>
            <div id="log"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // WebSocket Client
        // ==========================================
        let ws = null;
        let isConnected = false;
        let vehicleId = null;
        
        const logDiv = document.getElementById('log');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const vehicleIdSpan = document.getElementById('vehicleId');
        const timestampSpan = document.getElementById('timestamp');
        const logCountSpan = document.getElementById('logCount');
        
        let logCount = 0;
        
        // ==========================================
        // UI Update Functions
        // ==========================================
        function updateStatus(connected) {
            isConnected = connected;
            if (connected) {
                statusDot.className = 'status-dot online';
                statusText.className = 'status-text online';
                statusText.textContent = 'Connected';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('sendTelemetryBtn').disabled = false;
                document.getElementById('sendCommandBtn').disabled = false;
                document.getElementById('forwardBtn').disabled = false;
                document.getElementById('backwardBtn').disabled = false;
                document.getElementById('stopBtn').disabled = false;
            } else {
                statusDot.className = 'status-dot offline';
                statusText.className = 'status-text offline';
                statusText.textContent = 'Disconnected';
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                document.getElementById('sendTelemetryBtn').disabled = true;
                document.getElementById('sendCommandBtn').disabled = true;
                document.getElementById('forwardBtn').disabled = true;
                document.getElementById('backwardBtn').disabled = true;
                document.getElementById('stopBtn').disabled = true;
            }
        }
        
        function updateTelemetry(data) {
            if (data.battery !== undefined) {
                document.getElementById('battery').innerHTML = data.battery + ' <span class="unit">%</span>';
                // Battery color
                const el = document.getElementById('battery');
                if (data.battery < 20) el.style.color = '#ff4444';
                else if (data.battery < 50) el.style.color = '#ffaa00';
                else el.style.color = '#00ff88';
            }
            if (data.seedLevel !== undefined) {
                document.getElementById('seedLevel').innerHTML = data.seedLevel + ' <span class="unit">%</span>';
            }
            if (data.areaCovered !== undefined) {
                document.getElementById('areaCovered').innerHTML = data.areaCovered + ' <span class="unit">%</span>';
            }
            if (data.status !== undefined) {
                document.getElementById('vehicleStatus').textContent = data.status;
            }
            if (data.vehicleId !== undefined) {
                vehicleId = data.vehicleId;
                vehicleIdSpan.textContent = '🚜 ' + vehicleId;
            }
        }
        
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            let icon = '';
            let msgClass = '';
            switch(type) {
                case 'sent': icon = '📤 '; msgClass = 'sent'; break;
                case 'received': icon = '📨 '; msgClass = 'received'; break;
                case 'warn': icon = '⚠️ '; msgClass = 'warn'; break;
                case 'error': icon = '❌ '; msgClass = 'error'; break;
                default: icon = 'ℹ️ '; msgClass = 'info'; break;
            }
            entry.innerHTML = `<span class="time">[${time}]</span><span class="${msgClass}">${icon}${message}</span>`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            logCount++;
            logCountSpan.textContent = logCount + ' messages';
            
            // Limit log entries
            while (logDiv.children.length > 100) {
                logDiv.removeChild(logDiv.firstChild);
            }
        }
        
        function updateTimestamp() {
            const now = new Date();
            timestampSpan.textContent = now.toLocaleTimeString();
        }
        setInterval(updateTimestamp, 1000);
        
        // ==========================================
        // WebSocket Events
        // ==========================================
        function connectWebSocket() {
            try {
                addLog('Connecting to WebSocket server...', 'info');
                ws = new WebSocket('ws://localhost:5233/ws');
                
                ws.onopen = function() {
                    addLog('✅ Connected to server!', 'info');
                    updateStatus(true);
                    // Register
                    const registerMsg = {
                        type: 'register',
                        vehicleId: 'html-dashboard-001'
                    };
                    ws.send(JSON.stringify(registerMsg));
                    addLog('📤 Sent: Register (html-dashboard-001)', 'sent');
                };
                
                ws.onmessage = function(event) {
                    addLog('📨 Received: ' + event.data, 'received');
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'telemetry') {
                            updateTelemetry(data);
                        }
                        if (data.type === 'register_ack') {
                            updateTelemetry({ vehicleId: data.vehicleId });
                        }
                    } catch (e) {
                        // Not JSON, ignore
                    }
                };
                
                ws.onerror = function(error) {
                    addLog('❌ WebSocket Error: ' + (error.message || 'Connection error'), 'error');
                };
                
                ws.onclose = function() {
                    addLog('❌ Disconnected from server', 'error');
                    updateStatus(false);
                    vehicleIdSpan.textContent = '🚜 Not registered';
                };
                
            } catch (error) {
                addLog('❌ Connection failed: ' + error.message, 'error');
            }
        }
        
        // ==========================================
        // Send Functions
        // ==========================================
        function sendMessage(message) {
            if (!isConnected) {
                addLog('⚠️ Not connected to server!', 'warn');
                return;
            }
            try {
                ws.send(message);
                addLog('📤 Sent: ' + message, 'sent');
            } catch (error) {
                addLog('❌ Send error: ' + error.message, 'error');
            }
        }
        
        function sendCommand(command, value) {
            const msg = JSON.stringify({ command, value });
            sendMessage(msg);
        }
        
        // ==========================================
        // Event Listeners
        // ==========================================
        document.getElementById('connectBtn').addEventListener('click', connectWebSocket);
        
        document.getElementById('disconnectBtn').addEventListener('click', function() {
            if (ws) {
                ws.close();
                addLog('🔌 Disconnected by user', 'info');
                updateStatus(false);
            }
        });
        
        document.getElementById('sendTelemetryBtn').addEventListener('click', function() {
            const telemetry = {
                type: 'telemetry',
                battery: Math.floor(Math.random() * 30) + 70,
                seedLevel: Math.floor(Math.random() * 40) + 30,
                areaCovered: Math.round((Math.random() * 50 + 10) * 10) / 10,
                status: ['Running', 'Idle', 'Auto Mode'][Math.floor(Math.random() * 3)]
            };
            const message = JSON.stringify(telemetry);
            sendMessage(message);
        });
        
        document.getElementById('sendCommandBtn').addEventListener('click', function() {
            const input = document.getElementById('commandInput');
            sendMessage(input.value);
        });
        
        document.getElementById('forwardBtn').addEventListener('click', function() {
            sendCommand('forward', '50');
        });
        
        document.getElementById('backwardBtn').addEventListener('click', function() {
            sendCommand('backward', '30');
        });
        
        document.getElementById('stopBtn').addEventListener('click', function() {
            sendCommand('stop', '0');
        });
        
        // ==========================================
        // Keyboard Shortcuts
        // ==========================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.activeElement === document.getElementById('commandInput')) {
                document.getElementById('sendCommandBtn').click();
            }
        });
        
        // ==========================================
        // Initial State
        // ==========================================
        updateStatus(false);
        addLog('💡 Click "Connect" to connect to WebSocket server', 'info');
        addLog('📌 Use buttons to send commands to ESP32', 'info');
    </script>
</body>
</html>
